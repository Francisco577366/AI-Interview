services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "pnpm dev --hostname 0.0.0.0 --port 3000"
    stdin_open: true
    tty: true